version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: tena_db
    environment:
      POSTGRES_DB: tena
      POSTGRES_USER: tena_user
      POSTGRES_PASSWORD: tena_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tena_user -d tena"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tena_backend
    environment:
      - DATABASE_URL=postgresql://tena_user:tena_password@db:5432/tena
      - DJANGO_SETTINGS_MODULE=core.settings
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=your-secret-key-change-in-production
      - TELEGRAM_BOT_TOKEN=8219870105:AAHGiy0tMyrAD16iK_Va3jKwekznzAV43bw
      - TELEGRAM_BOT_USERNAME=TenawellnessBot
      - MINI_APP_URL=http://localhost:3000
      - GEMINI_API_KEY=AIzaSyA_B62fpN6fiOEM0SZJIq1JHp84V73twWg
      - FRONTEND_ORIGIN=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 core.wsgi:application"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tena_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8000/api

  # Telegram Bot (Optional - run separately if needed)
  bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tena_bot
    environment:
      - DATABASE_URL=postgresql://tena_user:tena_password@db:5432/tena
      - DJANGO_SETTINGS_MODULE=core.settings
      - DJANGO_SECRET_KEY=your-secret-key-change-in-production
      - TELEGRAM_BOT_TOKEN=8219870105:AAHGiy0tMyrAD16iK_Va3jKwekznzAV43bw
      - TELEGRAM_BOT_USERNAME=TenawellnessBot
      - MINI_APP_URL=http://localhost:3000
      - GEMINI_API_KEY=AIzaSyA_B62fpN6fiOEM0SZJIq1JHp84V73twWg
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python manage.py runbot
    profiles:
      - bot  # Only start with --profile bot

volumes:
  postgres_data:
